<!--
  Kiseroo logo — handoff for developer
  Place files on your server:
 - kiseroo-logo.svg (self-contained; transparent background)
    - kiseroo-logo-transparent.png  (optional; smaller HTML if referenced instead of inline SVG)

  Adjust paths below to match your project (e.g. /assets/... or CDN URL).
-->

<!-- Option A (recommended): <img> pointing at the SVG (works like any image) -->
<a class="site-logo" href="/" aria-label="kiseroo home">
  <img
    src="/assets/kiseroo-logo.svg"
    alt="kiseroo. smart shopping"
    width="256"
    height="86"
    decoding="async"
  />
</a>

<!--
 Option B: PNG (lighter page weight if you already optimize images; same look)
  <a class="site-logo" href="/" aria-label="kiseroo home">
    <img
      src="/assets/kiseroo-logo-transparent.png"
      alt="kiseroo. smart shopping"
      width="256"
      height="86"
      decoding="async"
    />
  </a>
-->

<!--
  Option C: Inline SVG file contents (copy only the opening <svg> ... </svg> from kiseroo-logo.svg)
  Use when you need CSS fill control or embedding in a sprite. Large because of embedded raster.
-->
